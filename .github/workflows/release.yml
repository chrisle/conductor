# Triggered on every push to main.
#
# The deploy skill bumps the version locally before pushing, so this
# workflow only builds and publishes — no version bump in CI.
#
# 1. Builds the Mac (DMG) and Windows (NSIS) installers in parallel
#    on self-hosted runners.
# 2. Publishes installers + latest.yml/latest-mac.yml to GitHub Releases.
#    electron-updater reads from the same release for in-app updates.
#
# Required GitHub secrets:
#   APPLE_CERTIFICATE_P12          Base64-encoded .p12 signing certificate
#   APPLE_CERTIFICATE_PASSWORD     Password for the .p12 certificate
#   APPLE_ID                       Apple ID email used for notarization
#   APPLE_APP_SPECIFIC_PASSWORD    App-specific password for the Apple ID
#   APPLE_TEAM_ID                  10-character Apple Developer Team ID
#
# GITHUB_TOKEN is provided automatically and used by electron-builder
# (via GH_TOKEN) to create the release.

name: Release

on:
  push:
    branches: [main]

# Serialize releases — never cancel an in-progress build.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, macOS]
            platform: mac
          - runner: [self-hosted, Windows]
            platform: win
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: conductord/go.mod
          cache-dependency-path: conductord/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build conductord binary
        # Explicit output name (no .exe) so the path matches what
        # electron-builder's extraResources expects on all platforms.
        working-directory: conductord
        shell: bash
        run: go build -o conductord .

      # ── macOS: sign, notarize, publish ────────────────────────────────────
      - name: Build and publish (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --mac --publish always

      # ── Windows: publish ──────────────────────────────────────────────────
      - name: Build and publish (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --win --publish always
