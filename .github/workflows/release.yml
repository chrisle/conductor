# Triggered on every push to main.
#
# The deploy skill bumps the version locally before pushing, so this
# workflow only builds, publishes, and tags — no version bump in CI.
#
# 1. Builds the Mac (DMG) and Windows (NSIS) installers in parallel
#    on GitHub-hosted runners.
# 2. Publishes installers + latest.yml/latest-mac.yml to GitHub Releases.
#    electron-updater reads from the same release for in-app updates.
# 3. Pushes a git tag `v<version>` (from package.json) after both
#    platform builds succeed, so the released commit is permanently
#    tagged in the repo (electron-builder's draft release alone does
#    not create the underlying git tag until manually published).
#
# Apple signing credentials are loaded at runtime from 1Password via the
# load-secrets-action.  The only GitHub secret needed is:
#   OP_SERVICE_ACCOUNT_TOKEN       1Password service account token
#
# GITHUB_TOKEN is provided automatically and used by electron-builder
# (via GH_TOKEN) to create the release.

name: Release

on:
  push:
    branches: [main]

# Serialize releases — never cancel an in-progress build.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Load Apple credentials from 1Password
        if: matrix.platform == 'mac'
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CSC_LINK: op://Conductor/Apple Developer/CERTIFICATE_P12
          CSC_KEY_PASSWORD: op://Conductor/Apple Developer/CERTIFICATE_PASSWORD
          APPLE_ID: op://Conductor/Apple Developer/APPLE_ID
          APPLE_APP_SPECIFIC_PASSWORD: op://Conductor/Apple Developer/APP_SPECIFIC_PASSWORD
          APPLE_TEAM_ID: op://Conductor/Apple Developer/APPLE_TEAM_ID

      - uses: actions/setup-go@v5
        with:
          go-version-file: conductord/go.mod
          cache-dependency-path: conductord/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build conductord binary
        # Explicit output name (no .exe) so the path matches what
        # electron-builder's extraResources expects on all platforms.
        working-directory: conductord
        shell: bash
        run: go build -o conductord .

      # ── macOS: sign, notarize, publish ────────────────────────────────────
      # Apple credentials (CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, etc.)
      # are already exported by the 1Password step above.
      - name: Build and publish (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --mac --publish always

      # ── Windows: publish ──────────────────────────────────────────────────
      - name: Build and publish (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --win --publish always

  # ── Tag the released commit ─────────────────────────────────────────────
  # Runs once after both platform builds succeed. Reads the version from
  # package.json and pushes `v<version>` to origin. Idempotent — if the
  # tag already exists (re-run on the same commit), it skips.
  tag:
    name: Tag release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push v<version> tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
