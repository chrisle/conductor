# Minimal tmux config for Conductor
# Use a real 256-color terminal so colors, glyphs, and ligatures render correctly.
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# No status bar — Conductor provides its own UI chrome.
set -g status off

# Don't rename windows automatically.
set -g allow-rename off

# Enable mouse mode so scroll wheel works as scrollback by default.
set -g mouse on

# Enable mouse mode so scroll wheel works as scrollback.
set -g mouse on
